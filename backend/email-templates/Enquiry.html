<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>{{purpose}}</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;">

  <table width="100%" cellspacing="0" cellpadding="0" style="background-color:#f4f6f8; padding:20px;">
    <tr>
      <td align="center">

        <!-- Container -->
        <table width="600" cellspacing="0" cellpadding="0"
          style="background:#ffffff; border-radius:8px; overflow:hidden; border:1px solid #064d0b;">

          <!-- Header -->
          <tr>
            <td style="background:#064d0b; padding:15px;">
              <table align="center" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle; padding-right:10px;">
                    <img src="{{logo_url}}" width="50" style="display:block;" alt="{{app_name}} Logo" />
                  </td>
                  <td
                    style="vertical-align:middle; color:#ffffff; font-size:24px; font-weight:700; letter-spacing:1px;">
                    {{app_name}}
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Title -->
          <tr>
            <td style="padding:20px; text-align:center;">
              <h2 style="margin:0; color:#2c3e50;">New Contact Inquiry</h2>
              <p style="color:#7f8c8d; font-size:14px;">
                A new message has been submitted from your website
              </p>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:20px;">
              <table width="100%" cellpadding="10" cellspacing="0"
                style="border-collapse:collapse; border:1px solid #eee;">
                <tr style="background:#f9f9f9;">
                  <td><strong>Name:</strong></td>
                  <td>{{name}}</td>
                </tr>
                <tr>
                  <td><strong>Email:</strong></td>
                  <td>{{email}}</td>
                </tr>
                <tr style="background:#f9f9f9;">
                  <td><strong>Message:</strong></td>
                  <td>{{message}}</td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Reply Button -->
          <tr>
            <td align="center" style="padding:20px;">
              <a href="mailto:{{email}}"
                style="background:#064d0b; color:#ffffff; padding:12px 25px; text-decoration:none; border-radius:5px; font-size:14px; display:inline-block;">
                Reply to Customer
              </a>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#ecf0f1; padding:15px; text-align:center; font-size:12px; color:#7f8c8d;">
              © {{year}} {{app_name}}. All rights reserved.<br>
              This is an automated message from your website contact form.
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>

</html>
